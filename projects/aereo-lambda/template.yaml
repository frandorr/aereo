AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  AEREO Lambda — local testing with SAM CLI.
  Build the image first (see README), then run:
    sam local invoke AereoLambdaFunction --event events/extraction-task.json
    sam local start-api

Globals:
  Function:
    Timeout: 900
    MemorySize: 3008

Parameters:
  ImageUri:
    Type: String
    Default: aereo-lambda:latest
    Description: Docker image URI for the Lambda function.

Resources:
  AereoLambdaFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref ImageUri
      Environment:
        Variables:
          AWS_ENDPOINT_URL: http://host.docker.internal:4566
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
      Policies:
        - S3CrudPolicy:
            BucketName: '*'
    Metadata:
      DockerContext: ../..
      Dockerfile: projects/aereo-lambda/Dockerfile
      DockerTag: latest

  AereoLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AereoLambdaFunction}
      RetentionInDays: 1

Outputs:
  AereoLambdaFunctionArn:
    Description: ARN of the AEREO Lambda function
    Value: !GetAtt AereoLambdaFunction.Arn
  AereoLambdaFunctionName:
    Description: Name of the AEREO Lambda function
    Value: !Ref AereoLambdaFunction
