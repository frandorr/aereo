[build-system]
build-backend = "hatchling.build"
requires = [ "hatchling" ]

[project]
name = "aer"
version = "0.1.0"
description = "A Python Polylith template code repo"
readme = "README.md"
license = "MIT"
authors = [ { name = "Your Name" } ]
requires-python = ">=3.13"
classifiers = [
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
]
dependencies = [
  "attrs>=25.4",
  "geopandas>=1.1.2",
  "pandas>=3.0.1",
  "pandera[geopandas]>=0.24",
  "pyarrow>=23.0.1",
  "pydantic>=2.12.5",
  "pydantic-settings>=2.13.1",
  "pyhdf>=0.11.6",
  "pyresample>=1.35",
  "python-geotiepoints>=1.9",
  "pyyaml>=6.0.3",
  "returns[compatible-mypy]>=0.26",
  "s3fs>=2025.2",
  "shapely>=2.1.2",
  "structlog>=25.5",
  "utm>=0.8.1",
]
optional-dependencies.aws-goes = [ "aer-search-aws-goes>=2" ]
optional-dependencies.earthaccess = [ "aer-search-earthaccess>=1.1.1" ]

[dependency-groups]
dev = [
  "aer-extract-aws-goes>=0.1",
  "aer-search-aws-goes>=2",
  "aer-search-earthaccess>=2.0.3,<3",
  "graphviz>=0.21",
  "matplotlib>=3.10.8",
  "polylith-cli>=1.42.5,<2",
  "pytest>=9.0.2,<10",
  "python-semantic-release>=10.5.3,<11",
  "satpy>=0.59",
  "types-requests>=2.32.4.20260107,<3",
]

[tool.hatch]
build.dev-mode-dirs = [ "components", "bases", "development", "." ]
metadata.allow-direct-references = true

[tool.uv]
sources.aer-core = { path = "projects/aer-core", editable = true }
sources.aer-extract-aws-goes = { path = "../aer-extract-aws-goes/projects/aer-extract-aws-goes", editable = true }
sources.aer-search-aws-goes = { path = "../aer-search-aws-goes/projects/aer-search-aws-goes", editable = true }
sources.aer-search-earthaccess = { path = "../aer-search-earthaccess/projects/aer-search-earthaccess", editable = true }
managed = true
workspace.members = [ "projects/*" ]

[tool.pytest]
ini_options.markers = [
  "slow: marks tests as slow (deselect with '-m \"not slow\"')",
  "integration: marks tests as integration tests",
]

[tool.mypy]
# The mypy configurations: http://bit.ly/2zEl9WI
mypy_path = "components:bases:development"
ignore_missing_imports = true
strict = true
local_partial_types = true
warn_unreachable = true
explicit_package_bases = true
enable_error_code = [
  "truthy-bool",
  "truthy-iterable",
  "redundant-expr",
  "unused-awaitable",
  # "ignore-without-code",
  "possibly-undefined",
  "redundant-self",
  # "explicit-override",
  # "mutable-override",
  "unimported-reveal",
]
disable_error_code = [
  "no-untyped-def",  # TODO: fix
  "no-untyped-call",
]

[tool.polylith]
bricks."components/aer/spectral" = "aer/spectral"
bricks."components/aer/temporal" = "aer/temporal"
bricks."components/aer/downloader" = "aer/downloader"
bricks."components/aer/downloader_aria2" = "aer/downloader_aria2"
bricks."components/aer/settings" = "aer/settings"
bricks."components/aer/spatial" = "aer/spatial"
bricks."components/aer/search" = "aer/search"
bricks."components/aer/goes_fetcher" = "aer/goes_fetcher"
bricks."components/aer/bootstrap" = "aer/bootstrap"
bricks."components/aer/plugin" = "aer/plugin"
bricks."components/aer/downloader_raw" = "aer/downloader_raw"
bricks."bases/aer/download_api" = "aer/download_api"
