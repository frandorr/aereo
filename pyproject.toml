[build-system]
build-backend = "hatchling.build"
requires = [ "hatchling" ]

[project]
name = "aer"
version = "0.1.0"
description = "A Python Polylith template code repo"
readme = "README.md"
license = "MIT"
authors = [ { name = "Your Name" } ]
requires-python = ">=3.13"
classifiers = [
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
]
dependencies = [
  "attrs>=25.4,<26",
  "earthaccess>=0.16,<0.17",
  "geopandas>=1.1.2,<2",
  "matplotlib>=3.10.8,<4",
  "pandas>=3.0.1,<4",
  "pandera[geopandas]>=0.24,<0.25",
  "pyarrow>=23.0.1,<24",
  "pydantic>=2.12.5,<3",
  "pydantic-settings>=2.13.1,<3",
  "pyhdf>=0.11.6,<0.12",
  "pyresample>=1.35,<2",
  "python-geotiepoints>=1.9,<2",
  "returns[compatible-mypy]>=0.26,<0.27",
  "s3fs>=2025.2,<2026",
  "satpy>=0.59,<0.60",
  "shapely>=2.1.2,<3",
  "structlog>=25.5,<26",
  "utm>=0.8.1,<0.9",
]
entry-points."aer.plugins".aria2 = "aer.downloader_aria2.core:download_aria2"
entry-points."aer.plugins".earthaccess = "aer.search_earthaccess.core:search_earthaccess"
entry-points."aer.plugins".goes_aws = "aer.search_goes_aws.core:search_goes_aws"
entry-points."aer.plugins".product_goes_aws = "aer.product_goes_aws.core:goes_aws_plugin"
entry-points."aer.plugins".product_modis_earthaccess = "aer.product_modis_earthaccess.core:modis_earthaccess_plugin"
entry-points."aer.plugins".product_sentinel3_earthaccess = "aer.product_sentinel3_earthaccess.core:sentinel3_earthaccess_plugin"
entry-points."aer.plugins".product_viirs_earthaccess = "aer.product_viirs_earthaccess.core:viirs_earthaccess_plugin"
entry-points."aer.plugins".spectral_goes = "aer.spectral_goes.core:goes_plugin"
entry-points."aer.plugins".spectral_modis = "aer.spectral_modis.core:modis_plugin"
entry-points."aer.plugins".spectral_sentinel3 = "aer.spectral_sentinel3.core:sentinel3_plugin"
entry-points."aer.plugins".spectral_viirs = "aer.spectral_viirs.core:viirs_plugin"

[dependency-groups]
dev = [
  "polylith-cli>=1.42.5,<2",
  "pytest>=9.0.2,<10",
  "python-semantic-release>=10.5.3,<11",
  "types-requests>=2.32.4.20260107,<3",
]

[tool.hatch]
build.dev-mode-dirs = [ "components", "bases", "development", "." ]
metadata.allow-direct-references = true

[tool.uv]
sources.aer-core = { workspace = true }
managed = true
workspace.members = [ "projects/*" ]
add-bounds = "major"

[tool.pytest]
ini_options.markers = [
  "slow: marks tests as slow (deselect with '-m \"not slow\"')",
  "integration: marks tests as integration tests",
]

[tool.mypy]
# The mypy configurations: http://bit.ly/2zEl9WI
mypy_path = "components:bases:development"
ignore_missing_imports = true
strict = true
local_partial_types = true
warn_unreachable = true
explicit_package_bases = true
enable_error_code = [
  "truthy-bool",
  "truthy-iterable",
  "redundant-expr",
  "unused-awaitable",
  # "ignore-without-code",
  "possibly-undefined",
  "redundant-self",
  # "explicit-override",
  # "mutable-override",
  "unimported-reveal",
]
disable_error_code = [
  "no-untyped-def",  # TODO: fix
  "no-untyped-call",
]

[tool.polylith]
bricks."components/aer/spectral" = "aer/spectral"
bricks."components/aer/temporal" = "aer/temporal"
bricks."components/aer/downloader" = "aer/downloader"
bricks."components/aer/search_earthaccess" = "aer/search_earthaccess"
bricks."components/aer/downloader_aria2" = "aer/downloader_aria2"
bricks."components/aer/settings" = "aer/settings"
bricks."components/aer/spatial" = "aer/spatial"
bricks."components/aer/search" = "aer/search"
bricks."components/aer/goes_fetcher" = "aer/goes_fetcher"
bricks."components/aer/bootstrap" = "aer/bootstrap"
bricks."components/aer/plugin" = "aer/plugin"
bricks."components/aer/search_goes_aws" = "aer/search_goes_aws"
