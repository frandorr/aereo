# default config.yaml
action: run
verbose: false

# Overrides / options
geojson: null
target_aoi: null
start: null
end: null
output: null
output_dir: ./out
output_uri: ${output_dir}
workers: 1
cells_per_task: 50
overwrite: false
search_results: null
tasks: null
plugin_name: null
format: table

# Runtime plugins (not part of ExtractionJob)
search: null
task_builder:
  _target_: aereo.builtins.task_builder.build_grouped_tasks
  cells_per_task: 50
  init_params: {}

# ExtractionJob configuration
name: default
derivative: null
grid_config:
  _target_: aereo.interfaces.GridConfig
  target_grid_dist: 50000
patch_config:
  _target_: aereo.interfaces.PatchConfig
  resolution: 10.0
  padding: 0
  margin: 10.0
extract:
  read: null
  preprocess: []
  reproject: null
  postprocess: []
  write: null
