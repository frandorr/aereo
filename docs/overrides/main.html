{% extends "base.html" %}

{# Custom site title in header — shows AER branding instead of plain text #}
{% block site_name %}
  <span class="md-header__title">
    <a href="{{ nav.homepage.url | url }}" title="{{ config.site_name or 'AER Documentation' }}" class="md-header__button md-logo" aria-label="{{ config.site_name or 'AER Documentation' }}">
      {% include "partials/logo.html" ignore missing %}
    </a>
    <div class="md-header__ellipsis">
      <div class="md-header__topic">
        <span class="md-ellipsis">
          🪐 AER
        </span>
      </div>
      <div class="md-header__topic" data-md-component="header-topic">
        <span class="md-ellipsis">
          {% if page.meta and page.meta.title %}
            {{ page.meta.title }}
          {% else %}
            {{ page.title }}
          {% endif %}
        </span>
      </div>
    </div>
  </span>
{% endblock %}
