site_name: AerEO
site_description: AerEO — Plugin-based satellite data extraction framework. From search to analysis-ready GeoTIFF in minutes.
site_author: Francisco Dorr
copyright: Copyright &copy; 2026 Francisco Dorr
site_url: https://frandorr.github.io/aereo
repo_name: frandorr/aereo
repo_url: https://github.com/frandorr/aereo
edit_uri: edit/main/docs/

hooks:
  - docs/hooks/copy_notebooks.py

theme:
  name: material
  palette:
    - media: (prefers-color-scheme)
      toggle:
        icon: material/lightbulb-auto
        name: Switch to light mode
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/lightbulb-outline
        name: Switch to system preference

  features:
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

  icon:
    repo: octicons/mark-github-24

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      separator: '[\s\-,:!=[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?=\w)'
      lang: en
  - mknotebooks:
      execute: false
      timeout: 600
      allow_errors: true
  - mermaid2
  - exclude:
      glob:
        - "hooks/*"
        - "includes/*"
        - "examples/config/*"
        - "examples/config/**/*"
        - "examples/06b-viirs-swath-odc-vs-faiss.ipynb"
  - minify:
      minify_html: true
  - mkdocstrings:
      handlers:
        python:
          paths: [components, bases]
          options:
            show_root_heading: true
            show_if_no_docstring: false
            inherited_members: true
            members_order: source
            separate_signature: true
            unwrap_annotated: true
            filters:
              - '!^_'
            merge_init_into_class: true
            docstring_section_style: spacy
            signature_crossrefs: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true

markdown_extensions:
  - abbr
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.highlight:
      line_spans: __span
      linenums_style: pymdownx-inline
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tilde
  - pymdownx.blocks.admonition:
      types:
        - note
        - attention
        - caution
        - danger
        - error
        - tip
        - hint
        - warning
        - info
        - check
  - pymdownx.blocks.details
  - pymdownx.blocks.tab:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/frandorr/aereo
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/aereo/

validation:
  links:
    not_found: warn
    absolute_links: warn

not_in_nav: |
  examples/config/README.md

nav:
  - Home: index.md
  - Get Started:
      - Install: install.md
      - Your First Pipeline: getting-started/first-pipeline.md
      - Pure Python Quickstart: getting-started/pure-python.md
      - Core Concepts: getting-started/concepts.md
  - Configuration:
      - Config Package: configuration/config-package.md
      - YAML Schema: configuration/yaml-schema.md
      - Hydra Overrides: configuration/overrides.md
  - Tutorials:
      - Overview: examples/index.md
      - Sentinel-2 (nir, red): examples/01-sentinel2.ipynb
      - Sentinel-2 NDVI: examples/01b-sentinel2-ndvi.ipynb
      - Sentinel-2 NDWI: examples/01c-sentinel2-ndwi.ipynb
      - Sentinel-2 raw Python: examples/step_by_step_raw.ipynb
      - VIIRS: examples/02-viirs.ipynb
      - Sentinel-3 OLCI: examples/03-sentinel3.ipynb
      - Sentinel-3 NDVI: examples/03b-sentinel3-ndvi.ipynb
      - GeoTessera: examples/04-tessera.ipynb
      - GOES-19 ABI: examples/05-goes19.ipynb
      - Multiple constellations: examples/06-multiple-constellation.ipynb
  - User Guide:
      - Choosing a Sensor: user-guide/choosing-a-sensor.md
      - Search: user-guide/search.md
      - Grids: user-guide/grids.md
      - Reprojection: user-guide/reprojection.md
      - Processing: user-guide/processing.md
      - Outputs & Catalog: user-guide/outputs.md
      - CLI: user-guide/cli.md
  - Serverless:
      - Run on AWS Lambda: serverless/lambda.md
  - Plugins:
      - Overview: plugins/overview.md
      - Build a Plugin: plugins/build-a-plugin.md
  - API Reference:
      - Pipeline: api/pipeline.md
      - Built-ins: api/builtins.md
      - Executors: api/executors.md
      - Interfaces: api/interfaces.md
      - Grid: api/grid.md
      - Schemas: api/schemas.md
      - Registry: api/registry.md
  - Contributing: contributing.md
