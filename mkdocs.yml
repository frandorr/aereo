site_name: AEREO
site_description: AEREO — Plugin-based satellite data extraction framework. From search to analysis-ready GeoTIFF in minutes.
site_author: Francisco Dorr
copyright: Copyright &copy; 2026 Francisco Dorr
site_url: https://frandorr.github.io/aereo
repo_name: frandorr/aereo
repo_url: https://github.com/frandorr/aereo
edit_uri: edit/main/docs/

hooks:
  - docs/hooks/copy_notebooks.py

theme:
  name: material
  variant: classic
  custom_dir: docs/overrides

  palette:
    - media: (prefers-color-scheme)
      toggle:
        icon: material/lightbulb-auto
        name: Switch to light mode
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/lightbulb-outline
        name: Switch to system preference

  features:
    - content.code.annotate
    - content.code.copy
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

  icon:
    repo: octicons/mark-github-24

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?=\w)'
      lang: en
  - mknotebooks:
      execute: true
      timeout: 600
      allow_errors: true
  - exclude:
      glob:
        - "hooks/*"
        - "includes/*"
        - "examples/config/*"
        - "examples/config/**/*"
  - mkdocstrings:
      handlers:
        python:
          paths: [components, bases]
          options:
            show_root_heading: true
            show_if_no_docstring: true
            inherited_members: true
            members_order: source
            separate_signature: true
            unwrap_annotated: true
            filters:
              - '!^_'
            merge_init_into_class: true
            docstring_section_style: spacy
            signature_crossrefs: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true

markdown_extensions:
  - abbr
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.highlight:
      line_spans: __span
      linenums_style: pymdownx-inline
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format ''
  - pymdownx.tilde
  - pymdownx.blocks.admonition:
      types:
        - note
        - attention
        - caution
        - danger
        - error
        - tip
        - hint
        - warning
        - info
        - check
  - pymdownx.blocks.details
  - pymdownx.blocks.tab:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/frandorr/aereo
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/aereo/

validation:
  links:
    not_found: warn
    absolute_links: warn

not_in_nav: |
  includes/abbreviations.md
  examples/config/README.md

nav:
