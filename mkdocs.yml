    - Get Started:
          - Install: install.md
          - Your First Pipeline: first-pipeline.md
    - Run Aereo:
          - run/index.md
          - Python API: run/run-with-python.md
          - CLI: run/run-with-cli.md
          - AWS Lambda: run/run-on-lambda.md
    - Concepts:
          - Pipeline Architecture: concepts/pipeline-architecture.md
          - Working with Grids: concepts/grids.md
          - Output Formats: concepts/output-formats.md
          - How Plugins Work: plugins/plugin-overview.md
    - Examples:
          - examples/index.md
          - 01 — Sentinel-2 true-color: examples/01-sentinel2.ipynb
          - 01b — Sentinel-2 NDVI: examples/01b-sentinel2-ndvi.ipynb
          - 02 — VIIRS: examples/02-viirs.ipynb
          - 03 — Sentinel-3 OLCI: examples/03-sentinel3.ipynb
          - 03b — Sentinel-3 NDVI: examples/03b-sentinel3-ndvi.ipynb
          - 04 — Tessera: examples/04-tessera.ipynb
          - 05 — GOES-19 ABI: examples/05-goes19.ipynb
    - Build Plugins:
          - Build Your First Plugin: plugins/build-first-plugin.md
