# Shared AER profiles for all extraction examples.
# Load via AereoProfile.from_yaml() and select by name.

profiles:
    - name: goes_c02
      resolution: 1000
      collections:
          ABI-L1b-RadF: ["C02"]
      read_params:
          reader: abi_l1b
          calibration: reflectance
          delay_writes: true
      search_params:
          satellite: GOES-19
      plugin_hints:
          search: search_aws_goes
          extract: extract_satpy

    - name: s2_rgb
      resolution: 10
      collections:
          sentinel-2-l2a: ["B04", "B03", "B02"]
      plugin_hints:
          search: search_planetary_computer
          extract: extract_odc_stac

    - name: viirs_i1
      resolution: 375
      collections:
          VJ202IMG: ["I01"]
          VJ203IMG: []
      read_params:
          reader: viirs_l1b
          calibration: reflectance
          resampling: nearest
          delay_writes: true
      plugin_hints:
          search: search_earthaccess
          extract: extract_satpy

    - name: olci_o08
      resolution: 300
      collections:
          S3A_OL_1_EFR: ["Oa08"]
      read_params:
          reader: olci_l1b
          calibration: radiance
          resampling: nearest
          delay_writes: true
      plugin_hints:
          search: search_earthaccess
          extract: extract_satpy

    - name: geotessera
      resolution: 10
      collections:
          geotessera: ["0", "1", "2"]
      read_params:
          max_download_workers: 4
          tmp_dir: /root/repos/aereo/examples
      plugin_hints:
          search: search_tessera
          extract: extract_tessera
