# Shared AER profiles for all extraction examples.
# Load via AereoProfile.from_yaml() and select by name.

profiles:
    - name: goes_c02
      resolution: 1000
      collections:
          ABI-L1b-RadF: ["C02"]
      search:
          search_aws_goes:
              satellite: GOES-19
      # read: extract_satpy (obsolete)

    - name: s2_rgb
      resolution: 10
      collections:
          sentinel-2-l2a: ["B04", "B03", "B02"]
      search:
          search_stac:
              pystac_open_params:
                  url: "https://planetarycomputer.microsoft.com/api/stac/v1"
      # read: extract_odc_stac (obsolete)

    - name: viirs_i1
      resolution: 375
      collections:
          VJ202IMG: ["I01"]
          VJ203IMG: []
      search:
          search_earthaccess: {}
      # read: extract_satpy (obsolete)

    - name: olci_o08
      resolution: 300
      collections:
          S3A_OL_1_EFR: ["Oa08"]
      search:
          search_earthaccess: {}
      # read: extract_satpy (obsolete)

    - name: geotessera
      resolution: 10
      collections:
          geotessera: ["0", "1", "2"]
      search:
          search_tessera: {}
      # read: extract_tessera (obsolete)
