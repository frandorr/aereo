# Top-level Hydra config package for an AEREO extraction job.
#
# Run with the Python API:
#   from hydra import initialize_config_dir, compose
#   from aereo.pipeline import ExtractionJob
#   cfg = compose(config_name="main_config")
#   job = ExtractionJob.model_validate(hydra.utils.instantiate(cfg, _convert_="all"))
defaults:
  - search: default
  - grid_config: default
  - patch_config: base
  - extract: sentinel2
  - _self_

output_uri: /tmp/aereo_extraction

# Optional AOI used to clip prepared extraction tasks. When omitted,
# ``target_aoi`` falls back to ``search.intersects``.
target_aoi: aoi/sample.geojson
