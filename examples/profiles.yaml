# Example AER profiles loaded via AerProfile.from_yaml()
# The *downloader* field can be either a live callable or a dotted import path.
#
# NOTE: Natural cell shapes (default)
#   By default, each grid cell extracts at its natural UTM footprint size.
#   Cells tile edge-to-edge with no gaps and no redundant overlap.
#
# NOTE: Fixed tensor shapes (ML training)
#   Add `conform_to_max_shape: true` to a profile when you need every cell
#   in a batch to share an identical (width, height).  The extraction
#   pipeline computes the maximum natural shape across the batch and pads
#   smaller cells with NaNs.  This is useful for neural-network training
#   pipelines that require fixed-size tensors.
#
#   Example:
#     - name: modis_thermal_ml
#       resolution: 1000
#       collections: [MOD021KM]
#       conform_to_max_shape: true

profiles:
  - name: viirs_i1
    resolution: 375
    collections:
      - VJ202IMG
      - VJ203IMG
    collection_variables_map:
      VJ202IMG: ["I01"]
      VJ203IMG: []
    channels: ["I01"]
    reader: viirs_l1b
    padding: 2
    resampling: nearest
    calibration: reflectance
    satellite: NOAA21
    plugin_hints:
      search: search_earthaccess
      extract: extract_satpy
    downloader: aer.search_earthaccess.earthaccess_download_wrapper

  - name: goes_c01
    resolution: 1000
    collections:
      - ABI-L1b-RadF
    collection_variables_map:
      ABI-L1b-RadF: ["C01"]
    channels: ["C01"]
    reader: abi_l1b
    padding: 2
    resampling: nearest
    calibration: reflectance
    satellite: GOES-19
    plugin_hints:
      search: search_aws_goes
      extract: extract_satpy

  - name: modis_thermal
    resolution: 1000
    collections:
      - MOD021KM
    collection_variables_map:
      MOD021KM: ["1"]
    reader: modis_l1b
    padding: 2
    resampling: nearest
    calibration: reflectance
    plugin_hints:
      search: search_earthaccess
      extract: extract_satpy
    search_params:
      version: "061"
    downloader: aer.search_earthaccess.earthaccess_download_wrapper

  - name: olci_rgb
    resolution: 300
    collections:
      - S3A_OL_1_EFR
    collection_variables_map:
      S3A_OL_1_EFR: ["Oa08"]
    reader: olci_l1b
    padding: 2
    resampling: nearest
    calibration: reflectance
    plugin_hints:
      search: search_earthaccess
      extract: extract_satpy
    downloader: aer.search_earthaccess.earthaccess_download_wrapper
