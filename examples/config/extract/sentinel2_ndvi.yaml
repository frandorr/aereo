read:
  _target_: aereo.builtins.ReadODCSTAC

preprocess:
  - _target_: aereo.builtins.NDVI
    # Element 84 Earth Search uses "nir" / "red" asset keys.
    ndvi_nir_band: nir
    ndvi_red_band: red

reproject:
  _target_: aereo.builtins.ReprojectODC
  resampling: nearest


write:
  _target_: aereo.builtins.WriteGeoTIFF
