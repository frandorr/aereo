name: Publish package

on:
  push:
    tags:
      - "aer*-v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write

    environment: pypi

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main branch
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "❌ ERROR: This tag was not pushed on the main branch."
            echo "Releases can only be published from commits on the main branch."
            exit 1
          fi
          echo "✅ Tag verified on main branch."

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Extract package
        id: tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PACKAGE=$(echo $TAG | sed -E 's/-v[0-9].*$//')

          echo "package=$PACKAGE" >> $GITHUB_OUTPUT

      - name: Build package
        run: |
          cd projects/${{ steps.tag.outputs.package }}

          echo "Current dir:"
          pwd

          echo "Project files:"
          ls -la

          rm -rf ../../dist
          uv build

          echo "Dist contents in root:"
          ls -la ../../dist || true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
