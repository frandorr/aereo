name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv pip install -e ./projects/aereo
      - run: uv pip install pytest pytest-cov ruff basedpyright
      - run: uv run pytest
      - run: uv run ruff check .
      - run: uv run basedpyright components/
